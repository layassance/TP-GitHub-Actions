name: Déploiement Continu Optimisé

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Récupération du code source
        uses: actions/checkout@v4

      - name: Installation des dépendances (si nécessaire)
        run: |
          if ! command -v nginx &> /dev/null; then
            sudo apt update && sudo apt install -y nginx
          fi

      - name: Mise à jour du contenu web
        run: |
          # On s'assure que le dossier existe
          sudo mkdir -p /var/www/site
          # On copie uniquement le fichier HTML
          sudo cp index.html /var/www/site/index.html
          # On ajuste les permissions
          sudo chown www-data:www-data /var/www/site/index.html

      - name: Rechargement de Nginx
        run: sudo systemctl reload nginx
